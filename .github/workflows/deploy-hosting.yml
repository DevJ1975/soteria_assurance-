name: Deploy Web Hosting

# Builds the Next.js static export (apps/web -> apps/web/out) and deploys it to
# Firebase Hosting target `web`. Mirrors the local flow exactly: it runs the
# repo's own `pnpm deploy:web` (-> scripts/deploy.sh --only hosting), so CI and
# local deploys stay in lockstep.

on:
  push:
    branches: [main]
    # Only redeploy when something that affects the hosted site changes.
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy-hosting.yml'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Serialize hosting deploys for a given ref; let an in-flight deploy finish
# rather than cancelling it mid-release.
concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build static export & deploy Hosting
    runs-on: ubuntu-latest
    env:
      # Generate with `firebase login:ci` and store under
      # Settings -> Secrets and variables -> Actions -> New repository secret.
      # (For a more modern setup, swap to a service-account JSON via
      # GOOGLE_APPLICATION_CREDENTIALS — scripts/deploy.sh honors either.)
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Reads the pinned version from package.json "packageManager".
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@^15

      - name: Fail fast if FIREBASE_TOKEN is missing
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set. Create one with 'firebase login:ci' and add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: 'Build static export & deploy Hosting (target: web)'
        # build:web -> apps/web/out, then `firebase deploy --only hosting:web`.
        # Project id resolves from .firebaserc (default: soteria-assurance).
        run: pnpm deploy:web
