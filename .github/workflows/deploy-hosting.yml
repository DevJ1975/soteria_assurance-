name: Deploy Web Hosting

# Builds the Next.js static export (apps/web -> apps/web/out) and deploys it to
# Firebase Hosting target `web`. Mirrors the local flow exactly: it runs the
# repo's own `pnpm deploy:web` (-> scripts/deploy.sh --only hosting), so CI and
# local deploys stay in lockstep.

on:
  push:
    branches: [main]
    # Only redeploy when something that affects the hosted site changes.
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy-hosting.yml'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Serialize hosting deploys for a given ref; let an in-flight deploy finish
# rather than cancelling it mid-release.
concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build static export & deploy Hosting
    runs-on: ubuntu-latest
    env:
      # Generate with `firebase login:ci` and store under
      # Settings -> Secrets and variables -> Actions -> New repository secret.
      # (For a more modern setup, swap to a service-account JSON via
      # GOOGLE_APPLICATION_CREDENTIALS — scripts/deploy.sh honors either.)
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      # Public Firebase web SDK config. Next.js inlines NEXT_PUBLIC_* values into
      # the static export at BUILD time, so these must be present here (apps/web/
      # .env.local is git-ignored and absent in CI). Stored as repo *variables*,
      # not secrets — this is public client config, not a secret.
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Reads the pinned version from package.json "packageManager".
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@^15

      - name: Validate required secret & config
        run: |
          missing=()
          if [ -z "${FIREBASE_TOKEN}" ]; then missing+=("FIREBASE_TOKEN (secret)"); fi
          if [ -z "${NEXT_PUBLIC_FIREBASE_API_KEY}" ]; then missing+=("NEXT_PUBLIC_FIREBASE_API_KEY (variable)"); fi
          if [ -z "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" ]; then missing+=("NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN (variable)"); fi
          if [ -z "${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" ]; then missing+=("NEXT_PUBLIC_FIREBASE_PROJECT_ID (variable)"); fi
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required CI config: ${missing[*]}"
            echo "Set the secret with 'gh secret set FIREBASE_TOKEN' and the public config with 'gh variable set NEXT_PUBLIC_FIREBASE_*' (or repo Settings -> Secrets and variables -> Actions)."
            exit 1
          fi

      - name: 'Build static export & deploy Hosting (target: web)'
        # build:web -> apps/web/out, then `firebase deploy --only hosting:web`.
        # Project id resolves from .firebaserc (default: soteria-assurance).
        run: pnpm deploy:web
